name: Deploy To Beget

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.BEGET_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy site files
        env:
          SSHPASS: ${{ secrets.BEGET_PASSWORD }}
        run: |
          if [ -d site ]; then SRC="./site/"; else SRC="./"; fi
          rsync -avz --delete \
            -e "sshpass -e ssh -o PreferredAuthentications=password -o PubkeyAuthentication=no" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".deploy" \
            --exclude "worker" \
            --exclude "cloudflare-worker.js" \
            "$SRC" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:${{ secrets.BEGET_PATH }}/"

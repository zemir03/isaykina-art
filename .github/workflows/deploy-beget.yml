name: Deploy To Beget

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BEGET_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.BEGET_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy site files
        run: |
          if [ -d site ]; then SRC="./site/"; else SRC="./"; fi
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".deploy" \
            --exclude "worker" \
            --exclude "cloudflare-worker.js" \
            "$SRC" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:${{ secrets.BEGET_PATH }}/"

name: Deploy To Beget

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Корректно подхватывает многострочный приватный ключ (лучше, чем echo в файл)
      - name: SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BEGET_SSH_KEY }}

      - name: Known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.BEGET_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy site files
        run: |
          if [ -d site ]; then SRC="./site/"; else SRC="./"; fi
          rsync -avz --delete \
            -e "ssh -o IdentitiesOnly=yes" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".deploy" \
            --exclude "worker" \
            --exclude "cloudflare-worker.js" \
            "$SRC" \
            "${{ secrets.BEGET_USER }}@${{ secrets.BEGET_HOST }}:${{ secrets.BEGET_PATH }}/"
